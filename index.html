<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Double-Tagging Test Page</title>
</head>
<body>
  <h1>Double-tagging control page</h1>
  <p>Strona wysyla dwa surowe page_view collect dla tid=G-TESTDBL001 natychmiast, rownolegle, z pominieciem gtag (ktory deduplikuje). Odwzorowuje sygnal dwoch niezaleznych instancji pomiaru. Oczekiwane: 2x collect tid=G-TESTDBL001.</p>
  <script>
    (function () {
      var ENDPOINT = "https://www.google-analytics.com/g/collect";
      var TID = "G-TESTDBL001";
      var CID = "555000111.1700000000";
      function sendPageView(seq) {
        var qs = "v=2&tid=" + TID +
                 "&cid=" + CID +
                 "&en=page_view" +
                 "&dl=" + encodeURIComponent(location.href) +
                 "&dt=" + encodeURIComponent(document.title) +
                 "&seq=" + seq;
        fetch(ENDPOINT + "?" + qs, { method: "POST", keepalive: true });
      }
      sendPageView(1);
      sendPageView(2);
    })();
  </script>
</body>
</html>
